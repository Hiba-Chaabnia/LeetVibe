<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetVibe | Authentication</title>
  <style>
    :root {
      --bg:      #0f0f0f;
      --surface: #0e0e0e;
      --border:  #2a2a2a;
      --brand:   #FF8205;
      --gold:    #FFD700;
      --honey:   #FFAF00;
      --ember:   #FA500F;
      --lava:    #E92700;
      --text:    #e0e0e0;
      --dim:     #888888;
      --green:   #00C44F;
      --amber:   #FFB300;
      --red:     #E53935;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Subtle scanline overlay */
    body::before {
      content: " ";
      display: block;
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.08) 50%),
        linear-gradient(90deg, rgba(255,80,0,0.02), rgba(0,0,0,0) 50%, rgba(255,80,0,0.01));
      background-size: 100% 3px, 3px 100%;
      z-index: 10;
      pointer-events: none;
    }

    /* Soft radial glow behind the card */
    body::after {
      content: "";
      position: absolute;
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(255,130,5,0.06) 0%, transparent 70%);
      z-index: 5;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 480px;
    }

    /* Terminal window chrome */
    .terminal-header {
      background: #141414;
      border: 1px solid var(--border);
      border-bottom: 1px solid #1a1a1a;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; background: #333; }
    .dot.red    { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green  { background: #27c93f; }

    .terminal-title {
      font-size: 11px;
      color: var(--dim);
      flex-grow: 1;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Card body */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-bottom-left-radius: 8px;
      border-bottom-right-radius: 8px;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      transition: border-color 0.35s ease;
    }

    /* Logo */
    .logo-wrap {
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-wrap svg {
      width: 96px;
      height: 38px;
      display: block;
    }

    .wordmark {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .wordmark .leet { color: var(--text); }
    .wordmark .vibe { color: var(--brand); }

    /* Status icon container */
    .status-icon {
      margin: 0 auto 1.5rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1.1rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid transparent;
      transition: all 0.35s ease;
      color: var(--dim);
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 0.65rem;
      letter-spacing: -0.01em;
      transition: color 0.35s ease;
      color: var(--text);
    }

    p {
      font-size: 0.88rem;
      color: var(--dim);
      line-height: 1.65;
      max-width: 320px;
      margin: 0 auto;
    }

    .badge {
      margin-top: 1.75rem;
      display: inline-block;
      padding: 0.5rem 1.1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.78rem;
      color: var(--brand);
      letter-spacing: 0.5px;
    }

    /* ── State variants ── */
    .state-success h1            { color: var(--green); }
    .state-success .card         { border-color: rgba(0,196,79,0.25); }
    .state-success .status-icon  {
      color: var(--green);
      background: rgba(0,196,79,0.08);
      border-color: rgba(0,196,79,0.2);
    }

    .state-error h1              { color: var(--red); }
    .state-error .card           { border-color: rgba(229,57,53,0.25); }
    .state-error .status-icon    {
      color: var(--red);
      background: rgba(229,57,53,0.08);
      border-color: rgba(229,57,53,0.2);
    }

    .state-pending h1            { color: var(--brand); }
    .state-pending .card         { border-color: rgba(255,130,5,0.25); }
    .state-pending .status-icon  {
      color: var(--brand);
      background: rgba(255,130,5,0.08);
      border-color: rgba(255,130,5,0.2);
    }

    /* Pulse animation for pending icon */
    @keyframes pulse {
      0%   { opacity: 0.4; transform: scale(0.97); }
      50%  { opacity: 1;   transform: scale(1);    }
      100% { opacity: 0.4; transform: scale(0.97); }
    }
    .state-pending .status-icon svg { animation: pulse 2s infinite ease-in-out; }

    .footer-note {
      margin-top: 1.75rem;
      font-size: 10px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

  </style>
</head>
<body>

  <div class="container" id="outer">
    <div class="terminal-header">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <div class="terminal-title">LeetVibe</div>
    </div>

    <div class="card">
      <div class="logo-wrap">
        <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" style="fill-rule:evenodd;clip-rule:evenodd;">
          <g transform="matrix(1,0,0,1,-7.462823,-5.88194)">
            <g transform="matrix(9.362745,0,0,10.403053,-32.913826,-2.770537)">
              <rect x="5.358" y="5.358" width="3.457" height="3.111" style="fill:#FFD700;"/>
            </g>
            <g transform="matrix(9.362745,0,0,10.403053,-32.913826,-13.55892)">
              <rect x="5.358" y="15.728" width="3.457" height="3.111" style="fill:#FA500F;"/>
            </g>
            <g transform="matrix(4.681372,0,0,10.403053,-7.831454,-6.366665)">
              <rect x="5.358" y="8.815" width="6.914" height="3.111" style="fill:#FFAF00;"/>
            </g>
            <g transform="matrix(10.254405,0,0,10.403053,-2.2465,-17.155151)">
              <rect x="1.901" y="19.185" width="10.37" height="3.111" style="fill:#E92700;"/>
            </g>
            <g transform="matrix(1.872544,0,0,10.403053,7.217998,-9.962688)">
              <rect x="5.358" y="12.272" width="17.284" height="3.111" style="fill:#FF8205;"/>
            </g>
            <g transform="matrix(9.362745,0,0,10.403053,171.144942,-2.770537)">
              <rect x="5.358" y="5.358" width="3.457" height="3.111" style="fill:#FFD700;"/>
            </g>
            <g transform="matrix(9.362745,0,0,10.403053,154.962421,-13.55892)">
              <rect x="5.358" y="15.728" width="3.457" height="3.111" style="fill:#FA500F;"/>
            </g>
            <g transform="matrix(4.681372,0,0,10.403053,196.227314,-6.366665)">
              <rect x="5.358" y="8.815" width="6.914" height="3.111" style="fill:#FFAF00;"/>
            </g>
            <g transform="matrix(1.872544,0,0,10.403053,211.276766,-9.962688)">
              <rect x="5.358" y="12.272" width="17.284" height="3.111" style="fill:#FF8205;"/>
            </g>
            <g transform="matrix(9.362745,0,0,10.403053,74.049814,-2.770537)">
              <rect x="5.358" y="5.358" width="3.457" height="3.111" style="fill:#FFD700;"/>
            </g>
            <g transform="matrix(9.362745,0,0,10.403053,90.232336,-13.55892)">
              <rect x="5.358" y="15.728" width="3.457" height="3.111" style="fill:#FA500F;"/>
            </g>
            <g transform="matrix(4.681372,0,0,10.403053,99.132186,-6.366665)">
              <rect x="5.358" y="8.815" width="6.914" height="3.111" style="fill:#FFAF00;"/>
            </g>
            <g transform="matrix(1.872544,0,0,10.403053,114.181638,-9.962688)">
              <rect x="5.358" y="12.272" width="17.284" height="3.111" style="fill:#FF8205;"/>
            </g>
            <g transform="matrix(6.241812,0,0,10.403053,144.711607,-17.155151)">
              <rect x="1.901" y="19.185" width="10.37" height="3.111" style="fill:#E92700;"/>
            </g>
          </g>
        </svg>
      </div>

      <div class="status-icon" id="icon-container">
        <!-- icon injected by JS -->
      </div>

      <h1 id="title">Initializing…</h1>
      <p id="msg">Establishing secure connection to Google services.</p>

      <div id="badge" class="badge" style="display:none"></div>

      <div class="footer-note">LeetVibe v0.1.0</div>
    </div>
  </div>


  <script>
    var BULB_SVG = `<svg width="44" height="44" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <path d="M6 2h4M5 3h1M10 3h1M4 4h1M11 4h1M4 5h1M11 5h1M4 6h1M11 6h1M4 7h1M11 7h1M5 8h1M10 8h1M6 9h1M9 9h1" stroke="currentColor" stroke-width="1"/>
      <path d="M6 10h4M6 11h1M9 11h1M6 12h4M7 13h2" stroke="currentColor" stroke-width="1"/>
    </svg>`;

    var CHECK_SVG = `<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
      <path d="M20 6L9 17L4 12"/>
    </svg>`;

    var ERROR_SVG = `<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
      <line x1="18" y1="6" x2="6" y2="18"/>
      <line x1="6" y1="6" x2="18" y2="18"/>
    </svg>`;

    var query = new URLSearchParams(window.location.search);
    var hash  = new URLSearchParams(window.location.hash.replace(/^#/, ''));

    function get(k) { return hash.get(k) || query.get(k) || ''; }

    var outer         = document.getElementById('outer');
    var iconContainer = document.getElementById('icon-container');
    var title         = document.getElementById('title');
    var msg           = document.getElementById('msg');
    var badge         = document.getElementById('badge');

    function show(state, svgContent, t, m, b) {
      outer.className = 'container state-' + state;
      iconContainer.innerHTML = svgContent;
      title.textContent = t;
      msg.textContent   = m;
      if (b) { badge.textContent = b; badge.style.display = 'inline-block'; }
      else   { badge.style.display = 'none'; }
    }

    var auth  = query.get('auth');
    var port  = query.get('port');
    var error = get('error');
    var at    = get('access_token');
    var rt    = get('refresh_token');
    var code  = get('code');

    if (auth === 'done') {
      show('success', CHECK_SVG,
        'Signed in with Google',
        'Authentication successful. You can close this tab and return to your terminal.',
        '→  LeetVibe is ready'
      );
    } else if (auth === 'error' || error) {
      show('error', ERROR_SVG,
        'Sign-in Failed',
        'Something went wrong during Google authentication. Return to LeetVibe and try again.',
        error || ''
      );
    } else if (port && (at || code)) {
      show('pending', BULB_SVG, 'Finalizing Session…', 'Syncing credentials with the LeetVibe CLI server.', '');
      var p = new URLSearchParams();
      if (at) { p.set('access_token', at); if (rt) p.set('refresh_token', rt); }
      else     { p.set('code', code); }
      setTimeout(function() {
        window.location.replace('http://127.0.0.1:' + port + '/result?' + p.toString());
      }, 800);
    } else {
      show('pending', BULB_SVG,
        'Waiting for Google…',
        'Complete sign-in in your browser. This page will update automatically.',
        ''
      );
    }
  </script>
</body>
</html>
