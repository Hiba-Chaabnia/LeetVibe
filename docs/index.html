<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeetVibe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #0e0e0e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 2.75rem 2.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 1.75rem;
    }

    .logo-wrap svg {
      width: 96px;
      height: 38px;
      display: block;
      margin: 0 auto 0.6rem;
    }

    .wordmark {
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .wordmark .leet { color: #e0e0e0; }
    .wordmark .vibe { color: #FF8205; }

    .icon  { font-size: 3rem; line-height: 1; margin-bottom: 1rem; }
    h1     { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.55rem; }
    p      { font-size: 0.93rem; color: #888888; line-height: 1.65; }

    .badge {
      margin-top: 1.5rem;
      display: inline-block;
      padding: 0.5rem 1.1rem;
      background: #121212;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #FF8205;
    }

    .state-success h1 { color: #00C44F; }
    .state-success .card { border-color: #00C44F33; }
    .state-error   h1 { color: #E53935; }
    .state-error   .card { border-color: #E5393533; }
    .state-pending h1 { color: #FF8205; }
    .state-pending .card { border-color: #FF820533; }
  </style>
</head>
<body>
  <div id="outer">
    <div class="card" id="card">
      <div class="logo-wrap">
        <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" style="fill-rule:evenodd;clip-rule:evenodd;">
          <g transform="matrix(1,0,0,1,-7.462823,-5.88194)">
            <g transform="matrix(9.362745,0,0,10.403053,-32.913826,-2.770537)">
              <rect x="5.358" y="5.358" width="3.457" height="3.111" style="fill:rgb(255,215,0);"/>
            </g>
            <g transform="matrix(9.362745,0,0,10.403053,-32.913826,-13.55892)">
              <rect x="5.358" y="15.728" width="3.457" height="3.111" style="fill:rgb(250,80,15);"/>
            </g>
            <g transform="matrix(4.681372,0,0,10.403053,-7.831454,-6.366665)">
              <rect x="5.358" y="8.815" width="6.914" height="3.111" style="fill:rgb(255,175,0);"/>
            </g>
            <g transform="matrix(10.254405,0,0,10.403053,-2.2465,-17.155151)">
              <rect x="1.901" y="19.185" width="10.37" height="3.111" style="fill:rgb(233,39,0);"/>
            </g>
            <g transform="matrix(1.872544,0,0,10.403053,7.217998,-9.962688)">
              <rect x="5.358" y="12.272" width="17.284" height="3.111" style="fill:rgb(255,130,5);"/>
            </g>
            <g transform="matrix(9.362745,0,0,10.403053,171.144942,-2.770537)">
              <rect x="5.358" y="5.358" width="3.457" height="3.111" style="fill:rgb(255,215,0);"/>
            </g>
            <g transform="matrix(9.362745,0,0,10.403053,154.962421,-13.55892)">
              <rect x="5.358" y="15.728" width="3.457" height="3.111" style="fill:rgb(250,80,15);"/>
            </g>
            <g transform="matrix(4.681372,0,0,10.403053,196.227314,-6.366665)">
              <rect x="5.358" y="8.815" width="6.914" height="3.111" style="fill:rgb(255,175,0);"/>
            </g>
            <g transform="matrix(1.872544,0,0,10.403053,211.276766,-9.962688)">
              <rect x="5.358" y="12.272" width="17.284" height="3.111" style="fill:rgb(255,130,5);"/>
            </g>
            <g transform="matrix(9.362745,0,0,10.403053,74.049814,-2.770537)">
              <rect x="5.358" y="5.358" width="3.457" height="3.111" style="fill:rgb(255,215,0);"/>
            </g>
            <g transform="matrix(9.362745,0,0,10.403053,90.232336,-13.55892)">
              <rect x="5.358" y="15.728" width="3.457" height="3.111" style="fill:rgb(250,80,15);"/>
            </g>
            <g transform="matrix(4.681372,0,0,10.403053,99.132186,-6.366665)">
              <rect x="5.358" y="8.815" width="6.914" height="3.111" style="fill:rgb(255,175,0);"/>
            </g>
            <g transform="matrix(1.872544,0,0,10.403053,114.181638,-9.962688)">
              <rect x="5.358" y="12.272" width="17.284" height="3.111" style="fill:rgb(255,130,5);"/>
            </g>
            <g transform="matrix(6.241812,0,0,10.403053,144.711607,-17.155151)">
              <rect x="1.901" y="19.185" width="10.37" height="3.111" style="fill:rgb(233,39,0);"/>
            </g>
          </g>
        </svg>
        <div class="wordmark"><span class="leet">Leet</span><span class="vibe">Vibe</span></div>
      </div>

      <div class="icon" id="icon">⏳</div>
      <h1 id="title">Processing…</h1>
      <p id="msg">Completing Google sign-in. Please wait.</p>
      <div id="badge" class="badge" style="display:none"></div>
    </div>
  </div>

  <script>
    var query = new URLSearchParams(window.location.search);
    var hash  = new URLSearchParams(window.location.hash.replace(/^#/, ''));

    function get(k) { return hash.get(k) || query.get(k) || ''; }

    var outer = document.getElementById('outer');
    var card  = document.getElementById('card');
    var icon  = document.getElementById('icon');
    var title = document.getElementById('title');
    var msg   = document.getElementById('msg');
    var badge = document.getElementById('badge');

    function show(state, ico, t, m, b) {
      outer.classList.add('state-' + state);
      icon.textContent  = ico;
      title.textContent = t;
      msg.textContent   = m;
      if (b) { badge.textContent = b; badge.style.display = 'inline-block'; }
    }

    var auth  = query.get('auth');
    var port  = query.get('port');
    var error = get('error');
    var at    = get('access_token');
    var rt    = get('refresh_token');
    var code  = get('code');

    if (auth === 'done') {
      show('success', '✓', 'Signed in with Google',
        'Authentication successful. You can close this tab and return to your terminal.',
        '→  LeetVibe is ready'
      );
    } else if (auth === 'error' || error) {
      show('error', '✗', 'Sign-in Failed',
        'Something went wrong during Google authentication. Return to LeetVibe and try again.',
        error || ''
      );
    } else if (port && (at || code)) {
      // Forward tokens to the local CLI server, which will redirect back here with ?auth=done
      var p = new URLSearchParams();
      if (at) { p.set('access_token', at); if (rt) p.set('refresh_token', rt); }
      else     { p.set('code', code); }
      window.location.replace('http://127.0.0.1:' + port + '/result?' + p.toString());
    } else {
      show('pending', '🎯', 'LeetVibe Authentication',
        'This page handles Google sign-in for the LeetVibe CLI. You arrive here automatically after authenticating.',
        ''
      );
    }
  </script>
</body>
</html>
